version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intent-network-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/intent_network.db
      - QOS_ENABLED=false
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - intent-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intent-network-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - intent-network
    restart: unless-stopped

networks:
  intent-network:
    driver: bridge

volumes:
  data: